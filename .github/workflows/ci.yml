name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & smoke test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      # `npm run smoke` builds (tsc) then runs the stdio MCP smoke check.
      - run: npm run smoke

  version-check:
    name: Version bump required
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fail if package.json version not bumped vs base branch
        run: |
          git fetch origin "$GITHUB_BASE_REF" --depth=1
          BASE=$(git show "origin/$GITHUB_BASE_REF:package.json" | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).version")
          PR=$(node -p "require('./package.json').version")
          echo "base ($GITHUB_BASE_REF): $BASE"
          echo "PR:            $PR"
          if [ "$BASE" = "$PR" ]; then
            echo "::error file=package.json::version ($PR) unchanged vs $GITHUB_BASE_REF — bump it before merging."
            exit 1
          fi
          HIGHEST=$(printf '%s\n%s\n' "$BASE" "$PR" | sort -V | tail -1)
          if [ "$HIGHEST" != "$PR" ]; then
            echo "::error file=package.json::version ($PR) is lower than $GITHUB_BASE_REF ($BASE) — version must increase."
            exit 1
          fi
          echo "Version bumped: $BASE -> $PR"

  publish:
    name: Publish to npm
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      # OIDC trusted publishing needs npm >= 11.5.1; Node's bundled npm may be older.
      - run: npm install -g npm@latest
      - run: npm ci
      # Skip (don't fail) when package.json version is already on npm — lets
      # non-version-bump merges to main pass clean. Publish only on a new version.
      - name: Check whether this version is already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view "$NAME@$LOCAL" version 2>/dev/null || true)
          if [ "$REMOTE" = "$LOCAL" ]; then
            echo "v$LOCAL already on npm — skipping publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "v$LOCAL not on npm — will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      # No token: authenticates via OIDC. prepublishOnly runs the build.
      # Provenance is generated automatically under trusted publishing.
      - name: Publish
        if: steps.check.outputs.publish == 'true'
        run: npm publish --access public
